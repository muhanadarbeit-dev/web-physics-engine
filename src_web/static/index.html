<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Physics Engine</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        ✨ Next-Gen 2D Physics Simulator
    </header>
    <div class="main-container">
        <div class="left-col">
            <div class="canvas-container" id="canvas-container">
                <canvas id="sim-canvas" width="1000" height="550"></canvas>
                <div class="telemetry-overlay" id="telemetry">
                    <div>Kinetic Energy: <span id="val-ke">0.0</span> J</div>
                    <div>Momentum Px: <span id="val-px">0.0</span></div>
                    <div>Momentum Py: <span id="val-py">0.0</span></div>
                    <div>Magnitude |p|: <span id="val-pmag">0.0</span> kg·m/s</div>
                </div>
            </div>
            <div class="graphs-container">
                <div class="graph-box">
                    <div class="graph-title">Kinetic Energy (J)</div>
                    <canvas id="graph-ke" height="150" width="480"></canvas>
                </div>
                <div class="graph-box">
                    <div class="graph-title">Momentum (kg·m/s)</div>
                    <canvas id="graph-mom" height="150" width="480"></canvas>
                </div>
            </div>
        </div>
        <div class="controls-panel">
            <h2>Add Bodies</h2>
            
            <div class="control-group">
                <div class="control-row">
                    <label>Radius</label>
                    <input type="number" id="inp-radius" value="20" disabled>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="chk-radius-rnd" checked>
                    <label>Randomize</label>
                </div>
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label>Density</label>
                    <input type="number" id="inp-density" value="1.0" step="0.1" disabled>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="chk-density-rnd" checked>
                    <label>Randomize</label>
                </div>
            </div>
            
            <div class="control-group">
                <div class="control-row">
                    <label>Speed</label>
                    <input type="number" id="inp-speed" value="100" disabled>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="chk-speed-rnd" checked>
                    <label>Randomize</label>
                </div>
            </div>

            <div class="control-group" style="margin-top: 10px;">
                <button class="btn" id="btn-add-ball">Add Ball</button>
                <div style="display:flex; gap:10px; align-items:center;">
                    <button class="btn" style="flex: 1;" id="btn-add-poly">Add Polygon</button>
                    <label>Sides: </label>
                    <input type="number" id="inp-edges" value="5" min="3" max="25" style="width:50px;">
                </div>
            </div>
            
            <h2 style="margin-top: 20px;">Environment & Physics</h2>
            <div class="control-group">
                <button class="btn btn-warning" id="btn-play-pause" style="margin-bottom: 5px;">Play / Pause</button>
            </div>
            
            <div class="checkbox-row">
                <input type="checkbox" id="chk-g-down" checked> <label>Gravity Down</label>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="chk-g-up"> <label>Gravity Up</label>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="chk-g-left"> <label>Gravity Left</label>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="chk-g-right"> <label>Gravity Right</label>
            </div>
            <div class="checkbox-row" style="margin-top: 10px;">
                <input type="checkbox" id="chk-elastic" checked> <label>Elastic Collisions (e=1)</label>
            </div>

            <h2 style="margin-top: 20px;">System</h2>
            <button class="btn btn-danger" id="btn-clear">Clear All</button>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
